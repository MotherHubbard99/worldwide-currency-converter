<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worldwide Currency Converter</title>
    <script type="module" crossorigin src="/assets/index-Du2qsNze.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-_PprZUM8.css">
  </head>

  <body>
    <header>
      <h1>Worldwide Currency Converter</h1>
    </header>

    <main>
      <!-- Input the amount in USD to CONVERT -->
      <section id="converter">
        <label for="usd-input">Amount in US Dollars:</label>
        <input type="number" id="usd-input" placeholder="Enter amount" />
        <p>
          <!--Country Selection-->
          <label for="country-select">Select Country:</label>
          <select id="country-select">
            <option value="">--Select a Country--</option>
          </select>

          <!-- Error messages -->
        </p>

        <p id="error-messages" class="error"></p>

        <!-- Conversion Result Card -->
        <div id="conversion-result" class="card"></div>
      </section>

      <!-- Country Info Card -->
      <section id="country-info">
        <h2>Country Information</h2>
        <div id="country-card" class="card"></div>
      </section>

      <!-- Favorites -->
      <div id="storage-output" class="card"><div>
    </main>

  </body>
</html>
